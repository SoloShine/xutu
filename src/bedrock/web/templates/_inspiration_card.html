<div class="insp-card" id="insp-{{ item.id }}">
<span class="status-badge status-{{ item.status }}">[{{ item.type }}] {{ item.status }}</span>
<p>{{ item.content }}</p>
{% if item.source %}<small>来源：{{ item.source }}</small><br>{% endif %}
{% if error %}
<em class="error-msg">⚠️ {{ error }}</em>
{% else %}
<!-- 状态推进按钮（htmx POST，按合法转移表显示） -->
{% set s = item.status %}
{% if s == 'raw' %}
<button hx-post="/inspirations/{{ item.id }}/advance" hx-vals='{"target":"refined"}' hx-target="#insp-{{ item.id }}" hx-swap="outerHTML">→ refined</button>
<button hx-post="/inspirations/{{ item.id }}/advance" hx-vals='{"target":"consumed"}' hx-target="#insp-{{ item.id }}" hx-swap="outerHTML">→ consumed</button>
<button hx-post="/inspirations/{{ item.id }}/advance" hx-vals='{"target":"discarded"}' hx-target="#insp-{{ item.id }}" hx-swap="outerHTML">→ discarded</button>
{% elif s == 'refined' %}
<button hx-post="/inspirations/{{ item.id }}/advance" hx-vals='{"target":"consumed"}' hx-target="#insp-{{ item.id }}" hx-swap="outerHTML">→ consumed</button>
<button hx-post="/inspirations/{{ item.id }}/advance" hx-vals='{"target":"partial"}' hx-target="#insp-{{ item.id }}" hx-swap="outerHTML">→ partial</button>
<button hx-post="/inspirations/{{ item.id }}/advance" hx-vals='{"target":"discarded"}' hx-target="#insp-{{ item.id }}" hx-swap="outerHTML">→ discarded</button>
{% elif s == 'partial' %}
<button hx-post="/inspirations/{{ item.id }}/advance" hx-vals='{"target":"consumed"}' hx-target="#insp-{{ item.id }}" hx-swap="outerHTML">→ consumed</button>
<button hx-post="/inspirations/{{ item.id }}/advance" hx-vals='{"target":"discarded"}' hx-target="#insp-{{ item.id }}" hx-swap="outerHTML">→ discarded</button>
{% elif s == 'consumed' %}
<button hx-post="/inspirations/{{ item.id }}/advance" hx-vals='{"target":"discarded"}' hx-target="#insp-{{ item.id }}" hx-swap="outerHTML">→ discarded</button>
{% endif %}
{% endif %}
</div>
