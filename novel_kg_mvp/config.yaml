# Novel Knowledge Graph MVP

NEO4J_URI: bolt://localhost:7687
NEO4J_USER: neo4j
NEO4J_PASSWORD: novel2024

# 数据路径（相对于项目根目录）
NOVEL_DATA_DIR: ../8-正文
CHAPTERS: 12

# 一致性检查阈值
CONSISTENCY_THRESHOLD: 0.7

# LLM 配置（OpenAI 兼容格式）
LLM:
  base_url: "https://open.bigmodel.cn/api/coding/paas/v4"  # 智谱AI
  api_key_env: "ZHIPU_API_KEY"                        # 从环境变量读取 API Key
  # api_key: ""                                       # 或直接填入（不推荐）
  model: "glm-5-turbo"                                # 模型名
  max_tokens: 16384                                   # 最大输出 token 数
  temperature: 0.7                                    # 温度（0=确定性，1=创造性）
